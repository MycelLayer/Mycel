<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mycel CI Status Widget</title>
    <meta
      name="description"
      content="A transparent GitHub Actions CI status widget for OBS Browser Source."
    >
    <meta name="theme-color" content="#0d6b57">
    <style>
      :root {
        color-scheme: dark;
        --bg: rgba(7, 10, 18, 0.82);
        --border: rgba(255, 255, 255, 0.12);
        --text: #f6f8ff;
        --muted: rgba(246, 248, 255, 0.72);
        --success: #33d17a;
        --failure: #ff5d73;
        --in-progress: #f6c445;
        --queued: #6ea8fe;
        --neutral: #b8c0ff;
        --cancelled: #8f9bb3;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      body {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 0;
      }

      .card {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        min-width: 340px;
        max-width: 640px;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--bg);
        color: var(--text);
        backdrop-filter: blur(12px);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.32);
      }

      .status-dot {
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: var(--neutral);
        box-shadow: 0 0 18px currentColor;
        color: var(--neutral);
      }

      .status-dot.in-progress {
        animation: pulse 1.4s ease-in-out infinite;
      }

      .copy {
        min-width: 0;
      }

      .headline {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .state {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.01em;
        text-transform: capitalize;
        white-space: nowrap;
      }

      .workflow {
        font-size: 15px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .meta {
        margin-top: 4px;
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hint {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .success {
        color: var(--success);
      }

      .failure,
      .timed_out,
      .action_required {
        color: var(--failure);
      }

      .in_progress,
      .pending,
      .requested,
      .waiting {
        color: var(--in-progress);
      }

      .queued {
        color: var(--queued);
      }

      .neutral,
      .skipped,
      .stale {
        color: var(--neutral);
      }

      .cancelled {
        color: var(--cancelled);
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.18);
          opacity: 0.72;
        }
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <div class="status-dot" id="dot"></div>
      <div class="copy">
        <div class="headline">
          <div class="state" id="state">Loading</div>
          <div class="workflow" id="workflow">GitHub Actions</div>
        </div>
        <div class="meta" id="meta">Fetching latest workflow run...</div>
        <div class="hint" id="hint">This widget polls GitHub Actions for the latest CI run on main.</div>
      </div>
    </div>

    <script>
      const CONFIG = {
        owner: "ctf2090",
        repo: "Mycel",
        workflowId: "ci.yml",
        branch: "main",
        pollMs: 60000,
        githubToken: "",
        labelPrefix: "CI: ",
        showRunNumber: true,
        showUpdatedAt: true,
        showBranch: true
      };

      const els = {
        card: document.getElementById("card"),
        dot: document.getElementById("dot"),
        state: document.getElementById("state"),
        workflow: document.getElementById("workflow"),
        meta: document.getElementById("meta"),
        hint: document.getElementById("hint")
      };

      function setStateClass(stateName) {
        const classes = [
          "success",
          "failure",
          "timed_out",
          "action_required",
          "in_progress",
          "pending",
          "requested",
          "waiting",
          "queued",
          "neutral",
          "skipped",
          "stale",
          "cancelled"
        ];
        els.card.classList.remove(...classes);
        els.dot.classList.remove(...classes);
        if (classes.includes(stateName)) {
          els.card.classList.add(stateName);
          els.dot.classList.add(stateName);
        }
      }

      function formatState(run) {
        if (!run) return "unknown";
        if (run.status && run.status !== "completed") {
          return run.status.replace(/-/g, "_");
        }
        return (run.conclusion || "completed").replace(/-/g, "_");
      }

      function formatTimestamp(value) {
        if (!value) return "";
        const date = new Date(value);
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      async function loadLatestRun() {
        const url = new URL(
          `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/actions/workflows/${encodeURIComponent(CONFIG.workflowId)}/runs`
        );
        url.searchParams.set("per_page", "1");
        if (CONFIG.branch) {
          url.searchParams.set("branch", CONFIG.branch);
        }

        const headers = {
          Accept: "application/vnd.github+json"
        };
        if (CONFIG.githubToken) {
          headers.Authorization = `Bearer ${CONFIG.githubToken}`;
        }

        try {
          const response = await fetch(url.toString(), { headers });
          if (!response.ok) {
            throw new Error(`GitHub API ${response.status}`);
          }

          const data = await response.json();
          const run = data.workflow_runs && data.workflow_runs[0];
          if (!run) {
            els.state.textContent = "No runs";
            els.workflow.textContent = `${CONFIG.owner}/${CONFIG.repo}`;
            els.meta.textContent = "No workflow runs matched the current filters.";
            els.hint.textContent = "Check workflowId, branch, or token permissions.";
            setStateClass("neutral");
            return;
          }

          const stateName = formatState(run);
          const stateLabel = stateName.replace(/_/g, " ");
          const parts = [];
          if (CONFIG.showBranch && run.head_branch) {
            parts.push(run.head_branch);
          }
          if (CONFIG.showRunNumber && run.run_number) {
            parts.push(`#${run.run_number}`);
          }
          if (run.event) {
            parts.push(run.event);
          }
          if (CONFIG.showUpdatedAt && run.updated_at) {
            parts.push(formatTimestamp(run.updated_at));
          }

          els.state.textContent = `${CONFIG.labelPrefix}${stateLabel}`;
          els.workflow.textContent = run.name || CONFIG.workflowId;
          els.meta.textContent = parts.join(" • ");
          els.hint.textContent = run.display_title || run.head_commit?.message || "";
          setStateClass(stateName);
        } catch (error) {
          els.state.textContent = "Error";
          els.workflow.textContent = `${CONFIG.owner}/${CONFIG.repo}`;
          els.meta.textContent = error.message;
          els.hint.textContent = "If this repo becomes private, add a token to CONFIG.githubToken.";
          setStateClass("failure");
        }
      }

      loadLatestRun();
      setInterval(loadLatestRun, Math.max(CONFIG.pollMs, 10000));
    </script>
  </body>
</html>
