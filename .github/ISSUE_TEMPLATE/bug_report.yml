name: Bug report
description: Report an implementation, validation, simulator, or documentation bug.
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Use this template for concrete defects. If the report is security-sensitive, do not post it here; use the path in `SECURITY.md`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What behavior is wrong, risky, or misleading?
      placeholder: Describe the user-visible or protocol-visible impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the exact steps, commands, fixture paths, or inputs needed to reproduce the problem.
      placeholder: |
        1. Run ...
        2. Validate ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Rust toolchain, commit SHA, and any relevant command output.
      placeholder: |
        OS:
        Rust:
        Commit:
        Command:
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: If relevant, note whether this affects protocol wording, fixtures, simulator behavior, or CLI contract.
      placeholder: Affects `object verify --json` output for malformed revision fixtures.
    validations:
      required: false
