version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Taipei
    assignees:
      - ctf2090
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Taipei
    assignees:
      - ctf2090
    groups:
      rust-workspace:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:30"
      timezone: Asia/Taipei
    assignees:
      - ctf2090
    groups:
      npm-root:
        patterns:
          - "*"
